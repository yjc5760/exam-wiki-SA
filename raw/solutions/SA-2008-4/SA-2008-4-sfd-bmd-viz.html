<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2008-4 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>剛架系統分析 (SA-2008-4)</h1>
            <p>矩陣直接勁度法 / 無側移剛架</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: A(200, 440), B(200, 200), C(560, 200) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <line x1="200" y1="440" x2="200" y2="200" class="frame-line" />
                    <line x1="200" y1="200" x2="560" y2="200" class="frame-line" />
                    
                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <line x1="170" y1="440" x2="230" y2="440" stroke="var(--accent-frame)" stroke-width="3"/>
                    <path d="M 170 440 L 160 450 M 190 440 L 180 450 M 210 440 L 200 450 M 230 440 L 220 450" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>
                    
                    <!-- C: Pin -->
                    <polygon points="560,200 550,220 570,220" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="540" y1="220" x2="580" y2="220" stroke="var(--accent-frame)" stroke-width="3"/>
                    <path d="M 540 220 L 530 230 M 560 220 L 550 230 M 580 220 L 570 230" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>

                    <!-- Nodes -->
                    <circle cx="200" cy="440" r="5" class="node" />
                    <circle cx="200" cy="200" r="5" class="node" />
                    <circle cx="560" cy="200" r="5" class="node" />

                    <!-- Labels -->
                    <text x="220" y="430" class="label">A</text>
                    <text x="175" y="190" class="label">B</text>
                    <text x="575" y="190" class="label">C</text>

                    <!-- Load on BC -->
                    <rect x="200" y="170" width="360" height="20" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
                    <text x="380" y="160" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">1 kN/m</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <!-- SFD scale: 1 kN = 20 px -->
                <g id="group-sfd" class="diagram-group hidden">
                    <line x1="200" y1="440" x2="200" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="200" x2="560" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- AB SFD: 1.13 -->
                    <path d="M 200 440 L 222.5 440 L 222.5 200 L 200 200 Z" class="sfd-fill" />
                    <text x="240" y="320" class="sfd-text">1.13</text>

                    <!-- BC SFD: 3.5 to -2.5 -->
                    <path d="M 200 200 L 200 130 L 560 250 L 560 200 Z" class="sfd-fill" />
                    <text x="230" y="120" class="sfd-text">3.50</text>
                    <text x="530" y="265" class="sfd-text">-2.50</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="440" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="200" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="560" cy="200" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <!-- BMD scale: 1 kN-m = 20 px -->
                <g id="group-bmd" class="diagram-group hidden">
                    <line x1="200" y1="440" x2="200" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="200" x2="560" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- AB BMD: 1.5 to 3.0 -->
                    <path d="M 200 440 L 230 440 L 260 200 L 200 200 Z" class="bmd-fill" />
                    <text x="250" y="435" class="bmd-text">1.5</text>
                    <text x="280" y="210" class="bmd-text">3.0</text>
                    
                    <!-- BC BMD: -3.0 to 0, max 3.13 -->
                    <path d="M 200 200 L 200 140 Q 380 350 560 200 Z" class="bmd-fill" />
                    <text x="200" y="130" class="bmd-text">-3.0</text>
                    <text x="410" y="280" class="bmd-text">3.13</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="440" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="200" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="560" cy="200" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
