<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2024-1 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>靜定梁位移分析 (SA-2024-1)</h1>
            <p>內部鉸 / 共軛梁法</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <!-- Base Grid (Optional for aesthetics) -->
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: A(100, 300), B(300, 300), C(500, 300), D(700, 300) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="100" y1="300" x2="700" y2="300" class="frame-line" /> <!-- AD -->
                    
                    <!-- Supports -->
                    <!-- A: Roller -->
                    <circle cx="100" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="80" y1="320" x2="120" y2="320" class="frame-line" />
                    <!-- D: Fixed -->
                    <path d="M 700 270 L 700 330 M 710 275 L 700 285 M 710 305 L 700 315 M 710 335 L 700 345" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>

                    <!-- Nodes -->
                    <circle cx="100" cy="300" r="6" class="node" /> <!-- A -->
                    <circle cx="300" cy="300" r="6" class="node" /> <!-- B -->
                    <circle cx="500" cy="300" r="8" fill="var(--bg-color)" stroke="var(--accent-frame)" stroke-width="3" /> <!-- C (Internal hinge) -->
                    <circle cx="700" cy="300" r="6" class="node" /> <!-- D -->

                    <!-- Labels -->
                    <text x="95" y="280" class="label">A</text>
                    <text x="295" y="280" class="label">B</text>
                    <text x="495" y="280" class="label">C</text>
                    <text x="695" y="280" class="label">D</text>

                    <!-- Loads -->
                    <!-- Point load at B -->
                    <line x1="300" y1="230" x2="300" y2="290" class="load-arrow" />
                    <polygon points="300,290 293,275 307,275" class="load-arrow" />
                    <text x="315" y="250" fill="#fbbf24" font-weight="bold" font-size="14px">100 kN</text>

                    <!-- Moment at A (CCW) -->
                    <path d="M 120 250 A 40 40 0 0 0 60 290" fill="none" class="load-arrow" />
                    <polygon points="60,290 53,275 67,275" class="load-arrow" transform="rotate(-30, 60, 290)" />
                    <text x="110" y="235" fill="#fbbf24" font-weight="bold" font-size="14px">200 kN-m</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <!-- SFD: AB: +75, BC: -25, CD: -25 -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD AB -->
                    <path d="M 100 300 L 100 225 L 300 225 L 300 300 Z" class="sfd-fill" />
                    <text x="200" y="215" class="sfd-text">75 kN</text>

                    <!-- SFD BCD -->
                    <path d="M 300 300 L 300 325 L 700 325 L 700 300 Z" class="sfd-fill" />
                    <text x="500" y="345" class="sfd-text">-25 kN</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="300" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="500" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <!-- BMD: A: -200, B: +100, C: 0, D: -100 -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD Fill -->
                    <path d="M 100 300 L 100 200 L 300 350 L 500 300 L 700 250 L 700 300 Z" class="bmd-fill" />
                    
                    <text x="100" y="185" class="bmd-text">-200</text>
                    <text x="300" y="370" class="bmd-text">100</text>
                    <text x="500" y="285" class="bmd-text">0</text>
                    <text x="700" y="235" class="bmd-text">-100</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="300" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="500" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            // Update buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all groups
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            // Show selected group
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
