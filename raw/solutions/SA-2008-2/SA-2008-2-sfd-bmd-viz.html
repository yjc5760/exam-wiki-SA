<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2008-2 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>五跨連續梁系統分析 (SA-2008-2)</h1>
            <p>傾角變位法 / 對稱結構分析</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: A(100,300), B(160,300), C(220,300), D(340,300), E(460,300), F(580,300), G(640,300), H(700,300) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <line x1="100" y1="300" x2="700" y2="300" class="frame-line" />
                    
                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <line x1="100" y1="270" x2="100" y2="330" stroke="var(--accent-frame)" stroke-width="3"/>
                    <path d="M 100 270 L 90 280 M 100 290 L 90 300 M 100 310 L 90 320 M 100 330 L 90 340" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>
                    
                    <!-- H: Fixed -->
                    <line x1="700" y1="270" x2="700" y2="330" stroke="var(--accent-frame)" stroke-width="3"/>
                    <path d="M 700 270 L 710 280 M 700 290 L 710 300 M 700 310 L 710 320 M 700 330 L 710 340" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>
                    
                    <!-- C, D, E, F: Roller -->
                    <circle cx="220" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="205" y1="320" x2="235" y2="320" class="frame-line" />
                    
                    <circle cx="340" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="325" y1="320" x2="355" y2="320" class="frame-line" />
                    
                    <circle cx="460" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="445" y1="320" x2="475" y2="320" class="frame-line" />
                    
                    <circle cx="580" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="565" y1="320" x2="595" y2="320" class="frame-line" />

                    <!-- Nodes -->
                    <circle cx="100" cy="300" r="5" class="node" />
                    <circle cx="220" cy="300" r="5" class="node" />
                    <circle cx="340" cy="300" r="5" class="node" />
                    <circle cx="460" cy="300" r="5" class="node" />
                    <circle cx="580" cy="300" r="5" class="node" />
                    <circle cx="700" cy="300" r="5" class="node" />

                    <!-- Labels -->
                    <text x="95" y="260" class="label">A</text>
                    <text x="215" y="290" class="label">C</text>
                    <text x="335" y="290" class="label">D</text>
                    <text x="455" y="290" class="label">E</text>
                    <text x="575" y="290" class="label">F</text>
                    <text x="695" y="260" class="label">H</text>

                    <!-- Loads -->
                    <!-- B: 10 kN -->
                    <line x1="160" y1="230" x2="160" y2="290" class="load-arrow" />
                    <polygon points="160,290 155,275 165,275" class="load-arrow" />
                    <text x="160" y="220" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">10 kN</text>
                    
                    <!-- G: 10 kN -->
                    <line x1="640" y1="230" x2="640" y2="290" class="load-arrow" />
                    <polygon points="640,290 635,275 645,275" class="load-arrow" />
                    <text x="640" y="220" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">10 kN</text>

                    <!-- CD: 1.2 kN/m -->
                    <rect x="220" y="260" width="120" height="20" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
                    <text x="280" y="250" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">1.2 kN/m</text>
                    
                    <!-- EF: 1.2 kN/m -->
                    <rect x="460" y="260" width="120" height="20" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
                    <text x="520" y="250" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">1.2 kN/m</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <!-- SFD scale: 1 kN = 15 px. Base y=300 -->
                <g id="group-sfd" class="diagram-group hidden">
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- AC: 4.632 to -5.368 -->
                    <path d="M 100 300 L 100 230.52 L 160 230.52 L 160 380.52 L 220 380.52 L 220 300 Z" class="sfd-fill" />
                    <text x="130" y="220" class="sfd-text">4.63</text>
                    <text x="190" y="395" class="sfd-text">-5.37</text>

                    <!-- CD: 2.755 to -4.445 -->
                    <path d="M 220 300 L 220 258.67 L 340 366.67 L 340 300 Z" class="sfd-fill" />
                    <text x="235" y="250" class="sfd-text">2.75</text>
                    <text x="325" y="380" class="sfd-text">-4.44</text>

                    <!-- DE: 0 -->
                    <!-- (No SFD shape) -->

                    <!-- EF: 4.445 to -2.755 -->
                    <path d="M 460 300 L 460 233.32 L 580 341.32 L 580 300 Z" class="sfd-fill" />
                    <text x="475" y="225" class="sfd-text">4.44</text>
                    <text x="565" y="355" class="sfd-text">-2.75</text>

                    <!-- FH: 5.368 to -4.632 -->
                    <path d="M 580 300 L 580 219.48 L 640 219.48 L 640 369.48 L 700 369.48 L 700 300 Z" class="sfd-fill" />
                    <text x="610" y="210" class="sfd-text">5.37</text>
                    <text x="670" y="385" class="sfd-text">-4.63</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="220" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="340" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="460" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="580" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <!-- BMD scale: 1 kN-m = 10 px. Base y=300 -->
                <g id="group-bmd" class="diagram-group hidden">
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- AC span -->
                    <path d="M 100 300 L 100 217.64 L 160 356.6 L 220 239.73 L 220 300 Z" class="bmd-fill" />
                    <text x="100" y="205" class="bmd-text">-8.24</text>
                    <text x="160" y="375" class="bmd-text">5.66</text>
                    
                    <!-- CD span (Parabola) -->
                    <path d="M 220 300 L 220 239.73 Q 280 280 340 290.45 L 340 300 Z" class="bmd-fill" />
                    <text x="220" y="225" class="bmd-text">-6.03</text>
                    
                    <!-- DE span (Constant) -->
                    <path d="M 340 300 L 340 290.45 L 460 290.45 L 460 300 Z" class="bmd-fill" />
                    <text x="400" y="280" class="bmd-text">-0.96</text>
                    
                    <!-- EF span (Parabola) -->
                    <path d="M 460 300 L 460 290.45 Q 520 280 580 239.73 L 580 300 Z" class="bmd-fill" />
                    
                    <!-- FH span -->
                    <path d="M 580 300 L 580 239.73 L 640 356.6 L 700 217.64 L 700 300 Z" class="bmd-fill" />
                    <text x="580" y="225" class="bmd-text">-6.03</text>
                    <text x="640" y="375" class="bmd-text">5.66</text>
                    <text x="700" y="205" class="bmd-text">-8.24</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="220" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="340" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="460" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="580" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="3" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
