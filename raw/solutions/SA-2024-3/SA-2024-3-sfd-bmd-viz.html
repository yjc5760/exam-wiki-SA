<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2024-3 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>門型構架極值比例分析 (SA-2024-3)</h1>
            <p>傾角變位法 / 反對稱變形</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <!-- Base Grid (Optional for aesthetics) -->
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: A(200, 450), B(200, 150), C(600, 150), D(600, 450) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="200" y1="450" x2="200" y2="150" class="frame-line" /> <!-- AB -->
                    <line x1="200" y1="150" x2="600" y2="150" class="frame-line" /> <!-- BC -->
                    <line x1="600" y1="150" x2="600" y2="450" class="frame-line" /> <!-- CD -->
                    
                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <path d="M 170 450 L 230 450 M 175 460 L 165 450 M 195 460 L 185 450 M 215 460 L 205 450 M 235 460 L 225 450" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>
                    <!-- D: Fixed -->
                    <path d="M 570 450 L 630 450 M 575 460 L 565 450 M 595 460 L 585 450 M 615 460 L 605 450 M 635 460 L 625 450" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>

                    <!-- Nodes -->
                    <circle cx="200" cy="450" r="6" class="node" /> <!-- A -->
                    <circle cx="200" cy="150" r="6" class="node" /> <!-- B -->
                    <circle cx="600" cy="150" r="6" class="node" /> <!-- C -->
                    <circle cx="600" cy="450" r="6" class="node" /> <!-- D -->

                    <!-- Labels -->
                    <text x="170" y="460" class="label">A</text>
                    <text x="170" y="140" class="label">B</text>
                    <text x="620" y="140" class="label">C</text>
                    <text x="620" y="460" class="label">D</text>

                    <!-- Loads -->
                    <line x1="120" y1="150" x2="190" y2="150" class="load-arrow" />
                    <polygon points="190,150 175,143 175,157" class="load-arrow" />
                    <text x="140" y="140" fill="#fbbf24" font-weight="bold" font-size="14px">P</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <!-- Qualitative SFD -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="450" x2="200" y2="150" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="150" x2="600" y2="150" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="600" y1="150" x2="600" y2="450" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD AB (P/2) -->
                    <path d="M 200 450 L 170 450 L 170 150 L 200 150 Z" class="sfd-fill" />
                    <!-- SFD BC -->
                    <path d="M 200 150 L 200 120 L 600 120 L 600 150 Z" class="sfd-fill" />
                    <!-- SFD CD (P/2) -->
                    <path d="M 600 150 L 570 150 L 570 450 L 600 450 Z" class="sfd-fill" />

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="450" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="150" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="150" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="450" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <!-- Qualitative BMD -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="450" x2="200" y2="150" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="150" x2="600" y2="150" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="600" y1="150" x2="600" y2="450" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD AB: A(-36, left), B(18, right) -->
                    <path d="M 200 450 L 164 450 L 218 150 L 200 150 Z" class="bmd-fill" />
                    <text x="150" y="440" class="bmd-text">2M</text>
                    <text x="235" y="250" class="bmd-text">M</text>

                    <!-- BMD BC: B(-18, top), C(18, bottom) -->
                    <path d="M 200 150 L 200 132 L 600 168 L 600 150 Z" class="bmd-fill" />
                    <text x="300" y="125" class="bmd-text">M</text>
                    <text x="500" y="185" class="bmd-text">M</text>

                    <!-- BMD CD: C(-18, left), D(36, right) -->
                    <path d="M 600 150 L 582 150 L 636 450 L 600 450 Z" class="bmd-fill" />
                    <text x="565" y="250" class="bmd-text">M</text>
                    <text x="650" y="440" class="bmd-text">2M</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="450" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="150" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="150" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="450" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            // Update buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all groups
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            // Show selected group
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
