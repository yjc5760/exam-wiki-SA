<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>RC-2014-2 彎矩-曲率圖</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#f8f9fa; margin:0; padding:12px; }
  h2 { font-size:14px; color:#2c3e50; margin:0 0 8px; text-align:center; }
  canvas { display:block; margin:0 auto; background:#fff; border:1px solid #ccc; border-radius:4px; }
  .info { width:580px; margin:8px auto 0; font-size:11px; color:#444; }
  table { width:100%; border-collapse:collapse; margin-top:6px; }
  td, th { border:1px solid #ccc; padding:4px 8px; text-align:center; font-size:11px; }
  th { background:#2c3e50; color:#fff; }
  tr:nth-child(even) { background:#f0f4f8; }
  .legend { display:flex; gap:14px; justify-content:center; margin:6px 0; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:4px; font-size:11px; }
  .dot { width:10px; height:10px; border-radius:50%; }
</style>
</head>
<body>
<h2>RC-2014-2 彎矩–曲率圖（M–φ Diagram）</h2>
<canvas id="cv" width="580" height="340"></canvas>
<div class="legend">
  <div class="leg"><div class="dot" style="background:#e74c3c"></div>開裂點 φ<sub>cr</sub></div>
  <div class="leg"><div class="dot" style="background:#f39c12"></div>最大彈性 φ<sub>el</sub></div>
  <div class="leg"><div class="dot" style="background:#27ae60"></div>計算強度 φ<sub>u</sub></div>
</div>
<div class="info">
  <table>
    <tr><th>階段</th><th>曲率 φ (×10⁻⁵ rad/cm)</th><th>彎矩 M (tf·m)</th></tr>
    <tr><td>開裂 φ<sub>cr</sub></td><td>0.4923</td><td>7.097</td></tr>
    <tr><td>最大彈性 φ<sub>el</sub></td><td>2.313</td><td>19.43</td></tr>
    <tr><td>計算強度 φ<sub>u</sub></td><td>10.70</td><td>53.10</td></tr>
    <tr><td colspan="2" style="text-align:right;font-weight:bold">φ<sub>u</sub>/φ<sub>cr</sub> = 21.7</td>
        <td style="font-weight:bold">M<sub>n</sub>/M<sub>cr</sub> = 7.48</td></tr>
  </table>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// Margins
const ml = 62, mr = 24, mt = 20, mb = 54;
const pw = W - ml - mr;
const ph = H - mt - mb;

// Data points (φ in ×10⁻⁵ rad/cm, M in tf·m)
// Origin
// Segment 1: (0,0) → (φcr,Mcr) uncracked stiffness
// Jump at cracking: φ_cracked = Mcr/(Ec*Icr) in same units
//   Ec*Icr = 8.40e10 kgf·cm² = 8.40e10/1e5 tf·m per (1/cm) = 8.40e5 tf·m·cm
//   in units ×10⁻⁵ rad/cm: stiffness = 8.40e5 tf·m / (1×10⁻⁵ cm⁻¹) = ...
//   Actually: M = Ec*Icr * φ → for M in kgf·cm, φ in rad/cm
//   Mel = 8.40e10 * 2.313e-5 = 1,942,803 kgf·cm ✓
//   φ_cracked_at_Mcr = Mcr/(Ec*Icr) = 709718/(8.40e10) = 8.45e-6 rad/cm = 0.845 ×10⁻⁵

const pts = [
  { phi: 0,     M: 0,     label: '',       color: null },
  { phi: 0.4923, M: 7.097, label: 'φcr\n(開裂)', color: '#e74c3c' },
  { phi: 0.845,  M: 7.097, label: '',       color: null },  // jump
  { phi: 2.313,  M: 19.43, label: 'φel\n(最大彈性)', color: '#f39c12' },
  { phi: 10.70,  M: 53.10, label: 'φu\n(計算強度)', color: '#27ae60' },
];

// Scale
const maxPhi = 12.0;
const maxM   = 62;

function toX(phi) { return ml + (phi / maxPhi) * pw; }
function toY(M)   { return mt + ph - (M / maxM) * ph; }

// Grid
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, W, H);

// Grid lines
ctx.strokeStyle = '#e8e8e8';
ctx.lineWidth = 1;
for (let m = 0; m <= maxM; m += 10) {
  ctx.beginPath();
  ctx.moveTo(ml, toY(m)); ctx.lineTo(ml + pw, toY(m));
  ctx.stroke();
}
for (let p = 0; p <= maxPhi; p += 2) {
  ctx.beginPath();
  ctx.moveTo(toX(p), mt); ctx.lineTo(toX(p), mt + ph);
  ctx.stroke();
}

// Axes
ctx.strokeStyle = '#2c3e50';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(ml, mt); ctx.lineTo(ml, mt + ph); ctx.lineTo(ml + pw, mt + ph);
ctx.stroke();

// Axis labels
ctx.fillStyle = '#2c3e50';
ctx.font = '11px Arial';
ctx.textAlign = 'right';
for (let m = 0; m <= maxM; m += 10) {
  ctx.fillText(m, ml - 5, toY(m) + 4);
}
ctx.textAlign = 'center';
for (let p = 0; p <= maxPhi; p += 2) {
  ctx.fillText(p, toX(p), mt + ph + 16);
}

// Axis titles
ctx.save();
ctx.translate(16, mt + ph / 2);
ctx.rotate(-Math.PI / 2);
ctx.textAlign = 'center';
ctx.font = 'bold 11px Arial';
ctx.fillText('彎矩 M (tf·m)', 0, 0);
ctx.restore();

ctx.textAlign = 'center';
ctx.font = 'bold 11px Arial';
ctx.fillText('曲率 φ (×10⁻⁵ rad/cm)', ml + pw / 2, H - 10);

// Shade zones
const zones = [
  { x1: 0, x2: 0.4923, label: '未開裂\nE_c I_t', color: 'rgba(52,152,219,0.07)' },
  { x1: 0.845, x2: 2.313, label: '開裂彈性\nE_c I_cr', color: 'rgba(243,156,18,0.08)' },
  { x1: 2.313, x2: 10.70, label: '非線性→極限', color: 'rgba(39,174,96,0.06)' },
];
zones.forEach(z => {
  ctx.fillStyle = z.color;
  ctx.fillRect(toX(z.x1), mt, toX(z.x2) - toX(z.x1), ph);
});

// Zone labels
ctx.font = '9px Arial';
ctx.fillStyle = '#666';
ctx.textAlign = 'center';
const zl = [
  { x: 0.25, y: 8, text: '未開裂' },
  { x: 1.58, y: 8, text: '開裂彈性' },
  { x: 6.5,  y: 8, text: '非線性' },
];
zl.forEach(z => { ctx.fillText(z.text, toX(z.x), mt + z.y + 10); });

// Draw M-φ curve segments
// Segment 1: (0,0) → (φcr, Mcr)
ctx.strokeStyle = '#2980b9';
ctx.lineWidth = 2.5;
ctx.beginPath();
ctx.moveTo(toX(0), toY(0));
ctx.lineTo(toX(0.4923), toY(7.097));
ctx.stroke();

// Vertical drop at cracking (stiffness change)
ctx.strokeStyle = '#aaa';
ctx.lineWidth = 1;
ctx.setLineDash([4, 3]);
ctx.beginPath();
ctx.moveTo(toX(0.4923), toY(7.097));
ctx.lineTo(toX(0.845), toY(7.097));
ctx.stroke();
ctx.setLineDash([]);

// Segment 2: cracked elastic (0.845, 7.097) → (2.313, 19.43)
ctx.strokeStyle = '#e67e22';
ctx.lineWidth = 2.5;
ctx.beginPath();
ctx.moveTo(toX(0.845), toY(7.097));
ctx.lineTo(toX(2.313), toY(19.43));
ctx.stroke();

// Segment 3: nonlinear (2.313, 19.43) → (10.70, 53.10) with slight curve
ctx.strokeStyle = '#27ae60';
ctx.lineWidth = 2.5;
ctx.beginPath();
ctx.moveTo(toX(2.313), toY(19.43));
// Use quadratic bezier for slight nonlinear curve
ctx.bezierCurveTo(
  toX(4.5), toY(35),
  toX(7.5), toY(48),
  toX(10.70), toY(53.10)
);
ctx.stroke();

// Key points
const keyPts = [
  { phi: 0.4923, M: 7.097,  c: '#e74c3c', label: 'φcr=4.92×10⁻⁶\nMcr=7.10 tf·m', anchor: 'right' },
  { phi: 2.313,  M: 19.43,  c: '#f39c12', label: 'φel=2.31×10⁻⁵\nMel=19.4 tf·m', anchor: 'right' },
  { phi: 10.70,  M: 53.10,  c: '#27ae60', label: 'φu=1.07×10⁻⁴\nMn=53.1 tf·m', anchor: 'left' },
];

keyPts.forEach(pt => {
  const x = toX(pt.phi);
  const y = toY(pt.M);
  // Circle
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, 2 * Math.PI);
  ctx.fillStyle = pt.c;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Label
  ctx.font = '9.5px Arial';
  ctx.fillStyle = '#333';
  const lines = pt.label.split('\n');
  const lx = pt.anchor === 'right' ? x - 8 : x + 8;
  const align = pt.anchor === 'right' ? 'right' : 'left';
  ctx.textAlign = align;
  const ly = pt.phi < 3 ? y - 16 : y - 16;
  lines.forEach((line, i) => {
    ctx.fillText(line, lx, ly + i * 12);
  });
});

// Ratio annotation
ctx.font = 'bold 10px Arial';
ctx.fillStyle = '#8e44ad';
ctx.textAlign = 'left';
ctx.fillText('φu/φcr = 21.7', toX(6.5), toY(10));
ctx.fillText('Mn/Mcr = 7.48', toX(6.5), toY(10) + 14);
</script>
</body>
</html>
