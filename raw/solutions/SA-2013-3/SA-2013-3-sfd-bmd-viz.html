<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2013-3 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SA-2013-3 剪力與彎矩圖</h1>
            <p>傾角變位法 / 側移剛架</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="200" y1="400" x2="200" y2="200" class="frame-line" /> <!-- AB -->
                    <line x1="200" y1="200" x2="400" y2="200" class="frame-line" /> <!-- BC -->
                    <line x1="400" y1="200" x2="600" y2="400" class="frame-line" /> <!-- CD -->
                    
                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <path d="M 170 400 L 230 400 M 175 410 L 165 400 M 195 410 L 185 400 M 215 410 L 205 400 M 235 410 L 225 400" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>
                    <!-- D: Fixed -->
                    <path d="M 570 400 L 630 400 M 575 410 L 565 400 M 595 410 L 585 400 M 615 410 L 605 400 M 635 410 L 625 400" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>

                    <!-- Nodes -->
                    <circle cx="200" cy="400" r="6" class="node" /> <!-- A -->
                    <circle cx="200" cy="200" r="6" fill="var(--bg-color)" stroke="var(--accent-frame)" stroke-width="2" /> <!-- B hinge -->
                    <circle cx="400" cy="200" r="6" class="node" /> <!-- C -->
                    <circle cx="600" cy="400" r="6" class="node" /> <!-- D -->

                    <!-- Labels -->
                    <text x="170" y="410" class="label">A</text>
                    <text x="170" y="190" class="label">B</text>
                    <text x="420" y="190" class="label">C</text>
                    <text x="620" y="410" class="label">D</text>

                    <!-- Load on BC -->
                    <line x1="200" y1="160" x2="400" y2="160" stroke="#fbbf24" stroke-width="2" />
                    <!-- Load arrows -->
                    <line x1="200" y1="160" x2="200" y2="190" class="load-arrow" /> <polygon points="200,195 195,185 205,185" class="load-arrow" />
                    <line x1="250" y1="160" x2="250" y2="190" class="load-arrow" /> <polygon points="250,195 245,185 255,185" class="load-arrow" />
                    <line x1="300" y1="160" x2="300" y2="190" class="load-arrow" /> <polygon points="300,195 295,185 305,185" class="load-arrow" />
                    <line x1="350" y1="160" x2="350" y2="190" class="load-arrow" /> <polygon points="350,195 345,185 355,185" class="load-arrow" />
                    <line x1="400" y1="160" x2="400" y2="190" class="load-arrow" /> <polygon points="400,195 395,185 405,185" class="load-arrow" />
                    <text x="300" y="150" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">w</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="400" x2="200" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="400" y1="200" x2="600" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD for BC -->
                    <path d="M 200 200 L 200 172.2 L 400 252.2 L 400 200 Z" class="sfd-fill" />
                    <text x="210" y="165" class="sfd-text">+0.348wL</text>
                    <text x="410" y="260" class="sfd-text">-0.652wL</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="200" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="200" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="400" x2="200" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="200" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="400" y1="200" x2="600" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD for BC -->
                    <path d="M 200 200 Q 269.56 250 400 139.12 L 400 200 Z" class="bmd-fill" />
                    <text x="270" y="240" class="bmd-text">0.061wL²</text>
                    <text x="400" y="130" class="bmd-text">-0.152wL²</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="200" cy="200" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="200" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            // Update buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all groups
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            // Show selected group
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
