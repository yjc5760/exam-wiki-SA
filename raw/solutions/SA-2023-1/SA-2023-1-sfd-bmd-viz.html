<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2023-1 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>剛架系統分析 (SA-2023-1)</h1>
            <p>靜定剛架 / 單位力法</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="150" y1="400" x2="630" y2="400" class="frame-line" /> <!-- A-E -->
                    <line x1="390" y1="400" x2="390" y2="240" class="frame-line" /> <!-- C-F -->
                    
                    <!-- Supports -->
                    <!-- B: Roller (230, 400) -->
                    <circle cx="230" cy="410" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="210" y1="420" x2="250" y2="420" class="frame-line" />

                    <!-- D: Hinge (550, 400) with Settlement -->
                    <path d="M 550 400 L 540 415 L 560 415 Z" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>
                    <line x1="530" y1="415" x2="570" y2="415" class="frame-line" />
                    <!-- Settlement label -->
                    <line x1="550" y1="425" x2="550" y2="455" stroke="var(--accent-bmd)" stroke-width="2" stroke-dasharray="4" />
                    <polygon points="550,455 545,445 555,445" fill="var(--accent-bmd)" />
                    <text x="560" y="450" fill="var(--accent-bmd)" font-size="12px">Δ = 3 mm</text>

                    <!-- Nodes -->
                    <circle cx="150" cy="400" r="4" class="node" /> <!-- A -->
                    <circle cx="230" cy="400" r="4" class="node" /> <!-- B -->
                    <circle cx="390" cy="400" r="4" class="node" /> <!-- C -->
                    <circle cx="550" cy="400" r="4" class="node" /> <!-- D -->
                    <circle cx="630" cy="400" r="4" class="node" /> <!-- E -->
                    <circle cx="390" cy="240" r="4" class="node" /> <!-- F -->

                    <!-- Labels -->
                    <text x="150" y="380" class="label" text-anchor="middle">A</text>
                    <text x="210" y="380" class="label">B</text>
                    <text x="410" y="415" class="label">C</text>
                    <text x="535" y="380" class="label">D</text>
                    <text x="630" y="380" class="label" text-anchor="middle">E</text>
                    <text x="410" y="235" class="label">F</text>

                    <!-- Loads -->
                    <line x1="310" y1="240" x2="380" y2="240" class="load-arrow" />
                    <polygon points="380,240 365,233 365,247" class="load-arrow" />
                    <text x="280" y="245" fill="#fbbf24" font-weight="bold" font-size="14px">P (28.13 kN)</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <g id="group-sfd" class="diagram-group hidden">
                    <line x1="150" y1="400" x2="630" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="390" y1="400" x2="390" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD B-D (-14.06 constant) -->
                    <!-- scale: roughly 2px per kN -> 28px -->
                    <path d="M 230 400 L 230 428 L 550 428 L 550 400 Z" class="sfd-fill" />
                    <text x="390" y="445" class="sfd-text">-14.06</text>

                    <!-- SFD C-F (+28.13 constant) -->
                    <!-- scale: 56px left side -->
                    <path d="M 390 240 L 334 240 L 334 400 L 390 400 Z" class="sfd-fill" />
                    <text x="315" y="320" class="sfd-text" transform="rotate(-90, 315, 320)">28.13</text>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <g id="group-bmd" class="diagram-group hidden">
                    <line x1="150" y1="400" x2="630" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="390" y1="400" x2="390" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD B-C (0 to -56.25, top) -->
                    <path d="M 230 400 L 390 343.75 L 390 400 Z" class="bmd-fill" />
                    <text x="350" y="335" class="bmd-text">-56.25</text>

                    <!-- BMD C-D (+56.25 to 0, bottom) -->
                    <path d="M 390 400 L 390 456.25 L 550 400 Z" class="bmd-fill" />
                    <text x="430" y="475" class="bmd-text">+56.25</text>

                    <!-- BMD C-F (0 at F to 112.5 at C, tension side/left) -->
                    <path d="M 390 240 L 277.5 400 L 390 400 Z" class="bmd-fill" />
                    <text x="250" y="380" class="bmd-text">112.5</text>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
