<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2022-1 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>剛架系統分析 (SA-2022-1)</h1>
            <p>靜不定結構與位移 / 綜合應用</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <!-- Base Grid (Optional for aesthetics) -->
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: d(100, 300), c(300, 300), b(500, 300), a(700, 300) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="100" y1="300" x2="700" y2="300" class="frame-line" /> 
                    
                    <!-- Supports -->
                    <!-- a: Fixed (700, 300) -->
                    <path d="M 700 270 L 700 330 M 700 275 L 710 265 M 700 295 L 710 285 M 700 315 L 710 305 M 700 335 L 710 325" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>
                    
                    <!-- d: Roller (100, 300) -->
                    <circle cx="100" cy="310" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="80" y1="320" x2="120" y2="320" class="frame-line" />

                    <!-- c: Spring (300, 300) -->
                    <path d="M 300 300 L 300 310 L 290 315 L 310 325 L 290 335 L 310 345 L 300 350 L 300 360" stroke="var(--accent-frame)" stroke-width="2" fill="none" />
                    <line x1="280" y1="360" x2="320" y2="360" class="frame-line" />
                    <path d="M 285 360 L 275 370 M 295 360 L 285 370 M 305 360 L 295 370 M 315 360 L 305 370" stroke="var(--accent-frame)" stroke-width="2" fill="none"/>

                    <!-- Nodes -->
                    <circle cx="100" cy="300" r="4" class="node" /> <!-- d -->
                    <circle cx="300" cy="300" r="4" class="node" /> <!-- c -->
                    <circle cx="500" cy="300" r="6" class="node" /> <!-- b (hinge) -->
                    <circle cx="700" cy="300" r="4" class="node" /> <!-- a -->

                    <!-- Labels -->
                    <text x="100" y="280" class="label" text-anchor="middle">d</text>
                    <text x="280" y="290" class="label">c</text>
                    <text x="500" y="280" class="label" text-anchor="middle">b (Hinge)</text>
                    <text x="680" y="290" class="label">a</text>
                    <text x="330" y="365" class="label" font-size="12px">e (Settlement)</text>

                    <!-- Loads -->
                    <line x1="300" y1="230" x2="300" y2="290" class="load-arrow" />
                    <polygon points="300,290 293,275 307,275" class="load-arrow" />
                    <text x="300" y="220" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">72 kN</text>

                    <line x1="500" y1="230" x2="500" y2="290" class="load-arrow" />
                    <polygon points="500,290 493,275 507,275" class="load-arrow" />
                    <text x="500" y="220" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">72 kN</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD d-c: +24 -->
                    <path d="M 100 300 L 100 276 L 300 276 L 300 300 Z" class="sfd-fill" />
                    <text x="200" y="265" class="sfd-text">+24 kN</text>

                    <!-- SFD c-b: -24 -->
                    <path d="M 300 300 L 300 324 L 500 324 L 500 300 Z" class="sfd-fill" />
                    <text x="400" y="340" class="sfd-text">-24 kN</text>

                    <!-- SFD b-a: -96 -->
                    <path d="M 500 300 L 500 396 L 700 396 L 700 300 Z" class="sfd-fill" />
                    <text x="600" y="415" class="sfd-text">-96 kN</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="300" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="500" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD d-c: 0 to 120 (bottom) -->
                    <path d="M 100 300 L 300 360 L 300 300 Z" class="bmd-fill" />
                    <text x="280" y="375" class="bmd-text">120</text>
                    <text x="100" y="290" class="bmd-text">0</text>

                    <!-- BMD c-b: 120 to 0 -->
                    <path d="M 300 300 L 300 360 L 500 300 Z" class="bmd-fill" />
                    <text x="500" y="290" class="bmd-text">0</text>

                    <!-- BMD b-a: 0 to -480 (top, scaled to 160px for fit) -->
                    <path d="M 500 300 L 700 140 L 700 300 Z" class="bmd-fill" />
                    <text x="700" y="130" class="bmd-text">-480</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="300" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="500" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
