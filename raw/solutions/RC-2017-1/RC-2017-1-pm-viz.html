<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>RC-2017-1 加大柱 40×70cm，8-D25（雙折線模型）</title>
<style>
body{font-family:sans-serif;background:#1a1a2e;color:#e0e0e0;margin:0;padding:10px}
h3{text-align:center;color:#a8d8ea;font-size:14px;margin:4px 0}
.sub{text-align:center;color:#888;font-size:11px;margin-bottom:6px}
canvas{display:block;margin:0 auto;background:#16213e;border:1px solid #333;border-radius:4px}
#tip{position:fixed;background:rgba(0,0,0,.9);color:#fff;padding:6px 10px;border-radius:4px;
      font-size:11px;pointer-events:none;display:none;border:1px solid #555;line-height:1.6}
.leg{display:flex;justify-content:center;gap:16px;margin-top:6px;font-size:11px}
.li{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<h3>RC-2017-1 加大柱 40×70cm，8-D25（雙折線模型）</h3>
<div class="sub">加大柱：原 40×40cm 兩側各加 15cm；f'c=210 kgf/cm²，雙折線應力模型（本圖採 Whitney 近似）</div>
<canvas id="cv" width="580" height="420"></canvas>
<div class="leg">
  <div class="li"><div class="dot" style="background:#4fc3f7"></div>φPn-φMn（設計強度）</div>
  <div class="li"><div class="dot" style="background:#81c784"></div>Pn-Mn（標稱強度）</div>
  <div class="li"><div class="dot" style="background:#ffb74d"></div>平衡點</div>
</div>
<div id="tip"></div>
<script>
const P = {"b": 40, "h": 70, "fc": 210, "fy": 4200, "rows": [[6.5, 20.268], [63.5, 20.268]]};

function beta1(fc){return fc<=280?0.85:Math.max(0.65,0.85-0.05*(fc-280)/70)}

function calcCurve(b,h,fc,fy,rows){
  const Es=2040000,ey=fy/Es,b1=beta1(fc);
  const pts=[];
  const dMax=Math.max(...rows.map(r=>r[0]));
  for(let i=0;i<=250;i++){
    const frac=i/250;
    const c=0.01*Math.pow(h*30/0.01,frac);
    const a=Math.min(b1*c,h);
    const Cc=0.85*fc*a*b;
    let Pn=Cc,Mn=Cc*(h/2-a/2);
    for(const r of rows){
      if(!r[1])continue;
      const eps=0.003*(c-r[0])/c;
      const fs=Math.max(-fy,Math.min(fy,eps*Es));
      const fn=(r[0]<a)?(fs-0.85*fc):fs;
      Pn+=fn*r[1]; Mn+=fn*r[1]*(h/2-r[0]);
    }
    const et=0.003*(dMax-c)/c;
    const phi=et>=0.005?0.9:et<=0.002?0.65:0.65+(et-0.002)/0.003*0.25;
    const Ast=rows.reduce((s,r)=>s+r[1],0);
    const Pmax=0.80*0.65*(0.85*fc*(b*h-Ast)+fy*Ast);
    pts.push({c,Pn:Math.min(Pn,Pmax*1.3),Mn:Math.abs(Mn),
               phiPn:Math.min(phi*Pn,Pmax),phiMn:phi*Math.abs(Mn),phi,et});
  }
  return pts;
}

function balPt(b,h,fc,fy,rows){
  const Es=2040000,b1=beta1(fc);
  const dMax=Math.max(...rows.map(r=>r[0]));
  const cb=6120/(6120+fy)*dMax,ab=b1*cb;
  const Cc=0.85*fc*ab*b;
  let Pb=Cc,Mb=Cc*(h/2-ab/2);
  for(const r of rows){
    if(!r[1])continue;
    const eps=0.003*(cb-r[0])/cb;
    const fs=Math.max(-fy,Math.min(fy,eps*Es));
    const fn=(r[0]<ab)?(fs-0.85*fc):fs;
    Pb+=fn*r[1]; Mb+=fn*r[1]*(h/2-r[0]);
  }
  return {Pb,Mb:Math.abs(Mb),phiPb:0.65*Pb,phiMb:0.65*Math.abs(Mb)};
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const ML=70,MR=20,MT=20,MB=50;
const PW=W-ML-MR,PH=H-MT-MB;

function draw(){
  const pts=calcCurve(P.b,P.h,P.fc,P.fy,P.rows);
  const bal=balPt(P.b,P.h,P.fc,P.fy,P.rows);
  const tf=v=>v/1000,tfm=v=>v/100000;
  const allP=pts.flatMap(p=>[tf(p.phiPn),tf(p.Pn)]);
  const allM=pts.flatMap(p=>[tfm(p.phiMn),tfm(p.Mn)]);
  const Pmax=Math.max(...allP)*1.12,Pmin=Math.min(...allP)*1.12;
  const Mmax=Math.max(...allM)*1.15;
  const px=M=>ML+M/Mmax*PW;
  const py=P_=>MT+(1-(P_-Pmin)/(Pmax-Pmin))*PH;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle='#2a3a5a';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){
    const x=ML+i/5*PW; ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,MT+PH);ctx.stroke();
    const y=MT+i/5*PH; ctx.beginPath();ctx.moveTo(ML,y);ctx.lineTo(ML+PW,y);ctx.stroke();
  }

  // zero P line
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(ML,py(0));ctx.lineTo(ML+PW,py(0));ctx.stroke();
  ctx.setLineDash([]);

  // nominal curve
  ctx.strokeStyle='#81c784';ctx.lineWidth=1;ctx.globalAlpha=0.45;
  ctx.beginPath();pts.forEach((p,i)=>{const x=px(tfm(p.Mn)),y=py(tf(p.Pn));i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();
  ctx.globalAlpha=1;

  // design curve
  ctx.strokeStyle='#4fc3f7';ctx.lineWidth=2.5;
  ctx.beginPath();pts.forEach((p,i)=>{const x=px(tfm(p.phiMn)),y=py(tf(p.phiPn));i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();

  // balanced point
  const bx=px(tfm(bal.phiMb)),by2=py(tf(bal.phiPb));
  ctx.fillStyle='#ffb74d';ctx.beginPath();ctx.arc(bx,by2,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffb74d';ctx.font='10px sans-serif';
  ctx.fillText('Pb='+tf(bal.phiPb).toFixed(0)+'tf',bx+8,by2-4);
  ctx.fillText('Mb='+tfm(bal.phiMb).toFixed(1)+'tf·m',bx+8,by2+10);

  // axes labels
  ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(let i=0;i<=5;i++) ctx.fillText((i/5*Mmax).toFixed(1),px(i/5*Mmax),MT+PH+16);
  ctx.fillText('φMn (tf·m)',ML+PW/2,H-6);
  ctx.textAlign='right';
  for(let i=0;i<=5;i++) ctx.fillText((Pmin+i/5*(Pmax-Pmin)).toFixed(0),ML-5,py(Pmin+i/5*(Pmax-Pmin))+4);
  ctx.save();ctx.translate(14,MT+PH/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.fillText('φPn (tf)',0,0);ctx.restore();

  // stats
  const Ast=P.rows.reduce((s,r)=>s+r[1],0);
  ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText("f'c="+P.fc+" fy="+P.fy+" kgf/cm²  ρg="+(Ast/(P.b*P.h)*100).toFixed(2)+"%  β1="+beta1(P.fc).toFixed(2),ML,MT+PH+38);

  // hover
  cv.onmousemove=function(e){
    const r=cv.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    let best=null,bd=999;
    for(const p of pts){const x=px(tfm(p.phiMn)),y=py(tf(p.phiPn)),d=Math.hypot(mx-x,my-y);if(d<bd){bd=d;best=p}}
    const tip=document.getElementById('tip');
    if(bd<20&&best){
      tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML='φPn='+tf(best.phiPn).toFixed(1)+' tf<br>φMn='+tfm(best.phiMn).toFixed(2)+' tf·m<br>c='+best.c.toFixed(1)+' cm<br>εt='+best.et.toFixed(4)+'<br>φ='+best.phi.toFixed(3);
    }else tip.style.display='none';
  };
  cv.onmouseleave=()=>document.getElementById('tip').style.display='none';
}
draw();
</script>
</body></html>
