<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2025-3 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG Elements Transitions */
        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        /* SFD Styles */
        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        /* BMD Styles */
        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>非均勻斷面梁分析 (SA-2025-3)</h1>
            <p>廣義傾角變位法 / 固端彎矩</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <!-- Base Grid (Optional for aesthetics) -->
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Nodes Coordinates: A(200, 300), B(600, 300) -->

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Non-prismatic beam profile -->
                    <path d="M 200 280 Q 400 295 600 280 L 600 320 Q 400 305 200 320 Z" fill="rgba(203, 213, 225, 0.2)" stroke="var(--accent-frame)" stroke-width="2" />
                    
                    <!-- Centerline -->
                    <line x1="200" y1="300" x2="600" y2="300" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="5,5" />

                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <line x1="200" y1="260" x2="200" y2="340" class="frame-line" />
                    <path d="M 190 265 L 200 275 M 190 285 L 200 295 M 190 305 L 200 315 M 190 325 L 200 335" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>
                    
                    <!-- B: Fixed -->
                    <line x1="600" y1="260" x2="600" y2="340" class="frame-line" />
                    <path d="M 600 265 L 610 275 M 600 285 L 610 295 M 600 305 L 610 315 M 600 325 L 610 335" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>

                    <!-- Labels -->
                    <text x="170" y="305" class="label">A</text>
                    <text x="620" y="305" class="label">B</text>

                    <!-- Loads -->
                    <line x1="400" y1="220" x2="400" y2="280" class="load-arrow" />
                    <polygon points="400,280 393,265 407,265" class="load-arrow" />
                    <text x="415" y="250" fill="#fbbf24" font-weight="bold" font-size="14px">P</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <!-- SFD: +P/2 then -P/2 -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="300" x2="600" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD Left -->
                    <path d="M 200 300 L 200 240 L 400 240 L 400 300 Z" class="sfd-fill" />
                    <text x="300" y="230" class="sfd-text">+P/2</text>

                    <!-- SFD Right -->
                    <path d="M 400 300 L 400 360 L 600 360 L 600 300 Z" class="sfd-fill" />
                    <text x="500" y="375" class="sfd-text">-P/2</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <!-- Qualitative BMD: fixed ends, P at center. -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="200" y1="300" x2="600" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD Fill -->
                    <path d="M 200 300 L 200 220 L 400 360 L 600 220 L 600 300 Z" class="bmd-fill" />
                    
                    <text x="200" y="205" class="bmd-text">-M_F</text>
                    <text x="400" y="380" class="bmd-text">+M_center</text>
                    <text x="600" y="205" class="bmd-text">-M_F</text>

                    <!-- Nodes overlay -->
                    <circle cx="200" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="600" cy="300" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            // Update buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all groups
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            // Show selected group
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
