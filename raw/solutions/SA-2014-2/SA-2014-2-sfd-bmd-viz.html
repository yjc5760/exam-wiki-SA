<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-2014-2 剪力與彎矩圖</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-sfd: #38bdf8;
            --accent-bmd: #fb7185;
            --accent-frame: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 113, 133, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 99px;
            width: fit-content;
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .svg-container {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .diagram-group {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .frame-line {
            stroke: var(--accent-frame);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .node {
            fill: var(--bg-color);
            stroke: var(--accent-frame);
            stroke-width: 3;
        }

        .load-arrow {
            fill: #fbbf24;
            stroke: #fbbf24;
            stroke-width: 2;
        }

        .sfd-fill {
            fill: var(--accent-sfd);
            fill-opacity: 0.2;
            stroke: var(--accent-sfd);
            stroke-width: 2;
            stroke-linejoin: round;
        }
        
        .sfd-text {
            fill: var(--accent-sfd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .bmd-fill {
            fill: var(--accent-bmd);
            fill-opacity: 0.2;
            stroke: var(--accent-bmd);
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .bmd-text {
            fill: var(--accent-bmd);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label {
            fill: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SA-2014-2 剪力與彎矩圖</h1>
            <p>諧合變位法 / 複合結構</p>
        </div>

        <div class="controls">
            <button class="active" onclick="setView('frame')">結構配置</button>
            <button onclick="setView('sfd')">剪力圖 (SFD)</button>
            <button onclick="setView('bmd')">彎矩圖 (BMD)</button>
        </div>

        <div class="svg-container">
            <svg viewBox="0 0 800 600">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- ================= FRAME GROUP ================= -->
                <g id="group-frame" class="diagram-group">
                    <!-- Members -->
                    <line x1="100" y1="400" x2="700" y2="400" class="frame-line" /> <!-- AB -->
                    <line x1="400" y1="175" x2="400" y2="400" class="frame-line" /> <!-- CD -->
                    
                    <!-- Supports -->
                    <!-- A: Fixed -->
                    <path d="M 70 370 L 70 430 M 60 375 L 70 385 M 60 395 L 70 405 M 60 415 L 70 425" stroke="var(--accent-frame)" stroke-width="3" fill="none"/>
                    <!-- B: Roller -->
                    <circle cx="700" cy="410" r="10" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="680" y1="420" x2="720" y2="420" class="frame-line" />
                    <!-- C: Pinned -->
                    <polygon points="400,175 390,155 410,155" fill="none" stroke="var(--accent-frame)" stroke-width="3"/>
                    <line x1="380" y1="155" x2="420" y2="155" class="frame-line" />

                    <!-- Nodes -->
                    <circle cx="100" cy="400" r="6" class="node" /> <!-- A -->
                    <circle cx="700" cy="400" r="6" class="node" /> <!-- B -->
                    <circle cx="400" cy="175" r="6" class="node" /> <!-- C -->
                    <circle cx="400" cy="400" r="6" fill="var(--bg-color)" stroke="var(--accent-frame)" stroke-width="2" /> <!-- D hinge -->

                    <!-- Labels -->
                    <text x="80" y="380" class="label">A</text>
                    <text x="710" y="380" class="label">B</text>
                    <text x="420" y="170" class="label">C</text>
                    <text x="420" y="420" class="label">D</text>

                    <!-- Load on AB -->
                    <line x1="100" y1="360" x2="700" y2="360" stroke="#fbbf24" stroke-width="2" />
                    <!-- Load arrows -->
                    <line x1="100" y1="360" x2="100" y2="390" class="load-arrow" /> <polygon points="100,395 95,385 105,385" class="load-arrow" />
                    <line x1="250" y1="360" x2="250" y2="390" class="load-arrow" /> <polygon points="250,395 245,385 255,385" class="load-arrow" />
                    <line x1="400" y1="360" x2="400" y2="390" class="load-arrow" /> <polygon points="400,395 395,385 405,385" class="load-arrow" />
                    <line x1="550" y1="360" x2="550" y2="390" class="load-arrow" /> <polygon points="550,395 545,385 555,385" class="load-arrow" />
                    <line x1="700" y1="360" x2="700" y2="390" class="load-arrow" /> <polygon points="700,395 695,385 705,385" class="load-arrow" />
                    <text x="400" y="350" fill="#fbbf24" font-weight="bold" font-size="14px" text-anchor="middle">8 kN/m</text>
                </g>

                <!-- ================= SFD GROUP ================= -->
                <g id="group-sfd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="400" x2="700" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="400" y1="175" x2="400" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- SFD for AB -->
                    <path d="M 100 400 L 100 350.4 L 400 446.4 L 400 344 L 700 440 L 700 400 Z" class="sfd-fill" />
                    <text x="120" y="340" class="sfd-text">24.8</text>
                    <text x="370" y="460" class="sfd-text">-23.2</text>
                    <text x="430" y="335" class="sfd-text">28.0</text>
                    <text x="680" y="455" class="sfd-text">-20.0</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="175" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

                <!-- ================= BMD GROUP ================= -->
                <g id="group-bmd" class="diagram-group hidden">
                    <!-- Base Frame (Faded) -->
                    <line x1="100" y1="400" x2="700" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <line x1="400" y1="175" x2="400" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

                    <!-- BMD for AB -->
                    <path d="M 100 400 L 100 342.4 Q 255 450 400 352 L 400 352 Q 575 480 700 400 Z" class="bmd-fill" />
                    <text x="110" y="330" class="bmd-text">-28.8</text>
                    <text x="255" y="450" class="bmd-text">9.64</text>
                    <text x="400" y="340" class="bmd-text">-24.0</text>
                    <text x="575" y="470" class="bmd-text">25.0</text>

                    <!-- Nodes overlay -->
                    <circle cx="100" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="700" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="175" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <circle cx="400" cy="400" r="4" fill="var(--bg-color)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </g>

            </svg>
        </div>
    </div>

    <script>
        function setView(viewId) {
            // Update buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all groups
            document.querySelectorAll('.diagram-group').forEach(grp => {
                grp.classList.add('hidden');
            });

            // Show selected group
            document.getElementById('group-' + viewId).classList.remove('hidden');
        }
    </script>
</body>
</html>
